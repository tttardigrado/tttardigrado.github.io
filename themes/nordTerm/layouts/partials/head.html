<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="/css/style.css">
    <link rel="stylesheet" type="text/css" href="/css/helper.css">
    <link rel="stylesheet" type="text/css" href="/css/prism.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    
    {{ $title := print .Site.Title " | " .Title }}
    {{ if .IsHome }}{{ $title = .Site.Title }}{{ end }}
    <title>{{ $title }}</title>

    <style>
        :root{
            --bg-dark:   {{ .Site.Params.colors.bgDark    }};
            --bg-light:  {{ .Site.Params.colors.bgLight   }};
            --text:      {{ .Site.Params.colors.text      }};
            --error:     {{ .Site.Params.colors.error     }};
            --alert:     {{ .Site.Params.colors.alert     }};
            --success:   {{ .Site.Params.colors.success   }};
            --primary:   {{ .Site.Params.colors.primary   }};
            --secondary: {{ .Site.Params.colors.secondary }};
        }
    </style>
</head>
