<footer class="flex-center-between bg-light">
    <div class="p-2 txt-up fw-bold bg-primary fg-light">{{ .Title }}</div>
    <div class="p-2 flex-center-between">
        {{ range .Site.Params.Social }}
            <a href="{{ .url }}" target="_blank" class="icon">
                <i class="mx-2 bi bi-{{ .icon }}"></i>
            </a>
        {{ end }}
    </div>
</footer>
